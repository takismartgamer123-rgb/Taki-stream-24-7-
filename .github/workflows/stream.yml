name: Taki Stream DZ 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl jq fontconfig fonts-dejavu-core fonts-noto-color-emoji imagemagick
          mkdir -p ~/.fonts
          curl -L "https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf" -o ~/.fonts/NotoColorEmoji.ttf
          fc-cache -f -v
          curl -L "${{ secrets.LOGO_URL }}" -o logo.png || touch logo.png
          convert logo.png -resize 100x100 logo.png || true

      - name: TAKI STREAM 24/7
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          # 1. الاخبار المضحكة DZ 😂 100 خبر
