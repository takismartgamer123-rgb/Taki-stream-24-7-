          "دراسة: المطر كي يصب في الصيف = المعجزة الثامنة"
          "خبر: واحد ربح في طومبولا، الجائزة كانت طومبولا اخرى"
          "عاجل: السكات في القسم = الاستاذ يكتب في الاختبار"
          "دراسة: كي تشري صباط جديد لازم تشتي عليه"
          "خبر: الزهر ما عندوش صاحب"
          "عاجل: كي يخلاص الغاز على 12 تاع الليل = الكارثة"
          "دراسة: النعاس في الحصة الاخيرة = واجب وطني"
          "خبر: واحد قال نخرج دقيقة، الشعب مزال يستنى فيه"
          "عاجل: الابليكاسيون اللي تمسحها ترجع تحتاجها غدوا"
          "دراسة: كي تكون فرحان الوقت يجري"
          "خبر: الطاكسي في الشتاء = اغلى من الذهب"
          "عاجل: كي يجيك كود من 6 ارقام = قلبك يخبط"
          "دراسة: النهار اللي ما تديش فيه البارابلوي = تصب"
          "خبر: واحد بغى يبيع التيليفون، الزبون قالو الباتري تاعي خير"
          "عاجل: الساعة اللي تضبطها باه تنوض = تطفيها و تكمل ترقد"
          "دراسة: اكثر رياضة نمارسوها هي الجري مور الحافلة"
          "خبر: الفلاش ديسك عندو رجلين، ديما يهرب"
          "عاجل: كي يقولك رانا لحقنا = مزال 10 كم"
          "دراسة: الضحكة تاع صح هي اللي ما عندهاش سبب"
          "خبر: واحد راح للبحر باه يتصور، البحر ما كانش"
          "عاجل: كي تكون حافظ و ما يسقسوكش = القهرة"
          "دراسة: الشاي بلونشين هو المشروب الرسمي للدراسة"
          "خبر: انا و الرياضة متخاصمين من الابتدائي"
          "عاجل: كي تسمع بونوي = راهم بداو يطفو الضو"
          "دراسة: النت يولي سريع كي يرقدو الناس كامل"
          "خبر: واحد شرى كليماتيزور، جات الشتاء"
          "عاجل: كي يقولولك دير كيما تحب = دير كيما نقولك"
          "دراسة: الرقاد بعد الماكلة = حلم كل جزائري"
          "خبر: التيليفون يطيح ديما على الوجه"
          "عاجل: كي تسلف دراهم = صاحبك ينساك"
          "دراسة: الغاشي في الادارة = رياضة يومية"
          "خبر: واحد قال ندير ستوري و نرقد، فاق الصباح"
          "عاجل: كي يضربك الضو = تولي تحب الظلام"
          "دراسة: الفطور تاع رمضان = جائزة نوبل"
          "خبر: كي تكون صايم الدقيقة تولي ساعة"
          "عاجل: المكيف في الصيف = الاكسجين"
          "دراسة: كي تشري حوايج جدد = ما تصبش الشتاء"
          "خبر: واحد بغى يتصور مع القمر، القمر دار روحو ما شافوش"
          "عاجل: كي يخلاص الفليكسي = تولي فيلسوف"
          "دراسة: الضحك بلا سبب = قلة ادب بكري، ضرك نورمال"
          "خبر: انا و الباك قصة عشق عمرها 3 سنين"
          "عاجل: واحد شرى باكي شيبس، لقاه 90% هواء و 10% شيبس"
